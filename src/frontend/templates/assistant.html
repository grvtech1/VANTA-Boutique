{{ define "assistant" }}

{{ template "header" . }}

<main>
  <div class="assistant-page">
    <div class="assistant-header">
      <h2>VANTA AI Assistant</h2>
      <p>Ask anything about our products, styling recommendations, or order assistance.</p>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="chat-message bot">
        Hello! I'm your VANTA shopping assistant. How can I help you discover our premium items today?
      </div>
    </div>

    <form class="chat-input-area" id="chat-form" onsubmit="event.preventDefault(); sendMessage();">
      <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off" required>
      <button type="submit" class="chat-send-btn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </form>
  </div>
</main>

{{ template "footer" . }}

<script>
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const messages = document.getElementById('chat-messages');
  const text = input.value.trim();
  if (!text) return;

  const userMsg = document.createElement('div');
  userMsg.className = 'chat-message user';
  userMsg.textContent = text;
  messages.appendChild(userMsg);
  input.value = '';
  messages.scrollTop = messages.scrollHeight;

  const typing = document.createElement('div');
  typing.className = 'typing-indicator';
  typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  messages.appendChild(typing);
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch('{{ $.baseUrl }}/bot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    typing.remove();

    const botMsg = document.createElement('div');
    botMsg.className = 'chat-message bot';
    botMsg.textContent = data.response || "I'm sorry, I couldn't process that request right now.";
    messages.appendChild(botMsg);
    messages.scrollTop = messages.scrollHeight;
  } catch (err) {
    typing.remove();
    const botMsg = document.createElement('div');
    botMsg.className = 'chat-message bot';
    botMsg.textContent = "Unable to connect to assistant service.";
    messages.appendChild(botMsg);
    messages.scrollTop = messages.scrollHeight;
  }
}
</script>

{{ end }}
