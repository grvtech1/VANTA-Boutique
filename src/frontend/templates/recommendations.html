{{ define "recommendations" }}
<section class="recommendations-section">
  <div class="vanta-container">
    <h3 class="section-heading">You May Also Like</h3>
    <div class="recommendations-grid">
      {{ range $.recommendations }}
      <a href="{{ $.baseUrl }}/product/{{ .Id }}" class="recommendation-card">
        <img src="{{ $.baseUrl }}{{ .Picture }}" alt="{{ .Name }}" loading="lazy">
        <div class="rec-info">
          <div class="rec-name">{{ .Name }}</div>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
