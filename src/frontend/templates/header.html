{{ define "header" }}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>VANTA — Premium Lifestyle Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ $.baseUrl }}/static/styles/styles.css">
    <link rel="stylesheet" type="text/css" href="{{ $.baseUrl }}/static/styles/cart.css">
    <link rel="stylesheet" type="text/css" href="{{ $.baseUrl }}/static/styles/order.css">
    <link rel="stylesheet" type="text/css" href="{{ $.baseUrl }}/static/styles/bot.css">
    <link rel='shortcut icon' type='image/x-icon' href='{{ $.baseUrl }}/static/favicon.ico' />
</head>

<body>
    <header>
        {{ if $.frontendMessage }}
        <div class="navbar">
            <div class="container d-flex justify-content-center">
                <div class="h-free-shipping">{{ $.frontendMessage }}</div>
            </div>
        </div>
        {{ end }}
        <div class="navbar sub-navbar">
            <div class="container d-flex justify-content-between">
                <a href="{{ $.baseUrl }}/" class="navbar-brand d-flex align-items-center">
                    <span class="vanta-wordmark">VANTA</span>
                </a>
                <div class="controls">

                    {{ if $.show_currency }}
                    <div class="h-controls">
                        <div class="h-control">
                            <span class="icon currency-icon"> {{ renderCurrencyLogo $.user_currency}}</span>
                            <form method="POST" class="controls-form" action="{{ $.baseUrl }}/setCurrency" id="currency_form" >
                                <select name="currency_code" onchange="document.getElementById('currency_form').submit();">
                                        {{range $.currencies}}
                                    <option value="{{.}}" {{if eq . $.user_currency}}selected="selected"{{end}}>{{.}}</option>
                                    {{end}}
                                </select>
                            </form>
                        </div>
                    </div>
                    {{ end }}

                    {{ if $.assistant_enabled }}
                    <a href="{{ $.baseUrl }}/assistant" class="cart-link" title="AI Assistant">
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: rgba(255,255,255,0.8);"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    </a>
                    {{ end }}

                    <a href="{{ $.baseUrl }}/cart" class="cart-link" title="Shopping Cart">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: rgba(255,255,255,0.8);"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        {{ if $.cart_size }}
                        <span class="cart-size-circle">{{$.cart_size}}</span>
                        {{ end }}
                    </a>
                </div>
            </div>
        </div>
    </header>
    {{end}}
